name: filesystem
version: 1.0.0
description: Sandboxed filesystem access within the agent's workspace (~/.aura/workspace/). The agent can read, write, list, delete, and organise files freely inside this directory. All access outside the workspace is blocked.
executor: filesystem.ts
enabled: true
source: human
requires_env: []
tools:
  - name: workspace_read
    description: Read a file from the agent's workspace. Returns the file content as text.
    parameters:
      type: object
      properties:
        path:
          type: string
          description: Relative path within the workspace (e.g. "notes/todo.md")
      required: [path]

  - name: workspace_write
    description: Write or append text to a file in the agent's workspace. Creates the file and any parent directories if they do not exist.
    parameters:
      type: object
      properties:
        path:
          type: string
          description: Relative path within the workspace
        content:
          type: string
          description: Text content to write
        append:
          type: boolean
          description: If true, append to the file instead of overwriting (default false)
      required: [path, content]

  - name: workspace_list
    description: List files and directories at a path within the agent's workspace.
    parameters:
      type: object
      properties:
        path:
          type: string
          description: Relative path to list (default is workspace root ".")
      required: []

  - name: workspace_delete
    description: Delete a file from the agent's workspace. Only deletes files, not directories.
    parameters:
      type: object
      properties:
        path:
          type: string
          description: Relative path to the file to delete
      required: [path]

  - name: workspace_mkdir
    description: Create a directory (and any missing parents) inside the agent's workspace.
    parameters:
      type: object
      properties:
        path:
          type: string
          description: Relative path of the directory to create
      required: [path]

  - name: workspace_move
    description: Move or rename a file or directory within the agent's workspace. Both source and destination must be inside the workspace.
    parameters:
      type: object
      properties:
        from:
          type: string
          description: Current relative path
        to:
          type: string
          description: New relative path
      required: [from, to]

  - name: workspace_info
    description: Get information about the agent's workspace — root path, number of files, and total disk usage in bytes.
    parameters:
      type: object
      properties: {}
      required: []
