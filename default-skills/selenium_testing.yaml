name: selenium_testing
version: 1.0.0
description: Browser-based UI testing powered by Selenium WebDriver + Chromium. Write and run tests, assert page elements, fill forms, and generate test scripts for any web application.
executor: selenium_testing.ts
enabled: true
source: human
requires_env: []
tools:
  - name: run_test_script
    description: Execute a JavaScript test script against a URL using Selenium WebDriver. The script has access to `driver` (WebDriver instance), `By`, `until`, and `assert(condition, message)`. Returns a structured pass/fail report with per-assertion results and timing.
    parameters:
      type: object
      properties:
        url:
          type: string
          description: The URL to open before running the script (must start with http:// or https://)
        script:
          type: string
          description: |
            JavaScript test script. Available globals: driver, By, until, Key, assert(cond, msg).
            Example:
              const title = await driver.getTitle();
              assert(title.includes('Example'), 'page title should contain Example');
              const h1 = await driver.findElement(By.css('h1'));
              const text = await h1.getText();
              assert(text.length > 0, 'h1 should not be empty');
        timeout_ms:
          type: number
          description: Max time in milliseconds to allow for the full test run (default 30000)
      required: [url, script]

  - name: assert_element
    description: Assert that an element matching a CSS selector exists on a page, optionally checking its visible text or that it is interactable. Returns pass/fail with the actual value found.
    parameters:
      type: object
      properties:
        url:
          type: string
          description: The URL to test
        selector:
          type: string
          description: CSS selector for the element to find
        expected_text:
          type: string
          description: If provided, assert the element's trimmed innerText contains this string
        should_be_visible:
          type: boolean
          description: If true, also assert the element is displayed and not hidden (default true)
        timeout_ms:
          type: number
          description: How long to wait for the element to appear (default 10000)
      required: [url, selector]

  - name: fill_form
    description: Navigate to a URL, fill in form fields by CSS selector, optionally submit the form, and return the resulting page title and URL. Useful for testing login flows, search bars, and multi-step forms.
    parameters:
      type: object
      properties:
        url:
          type: string
          description: The URL of the page containing the form
        fields:
          type: array
          description: List of fields to fill in order
          items:
            type: object
            properties:
              selector:
                type: string
                description: CSS selector for the input element
              value:
                type: string
                description: Value to type into the field
              clear_first:
                type: boolean
                description: Clear existing value before typing (default true)
            required: [selector, value]
        submit_selector:
          type: string
          description: CSS selector of the submit button or form element to click/submit. If omitted, no submit action is taken.
        wait_after_ms:
          type: number
          description: Milliseconds to wait after submit before reading results (default 2000)
      required: [url, fields]

  - name: take_test_screenshot
    description: Navigate to a URL with Selenium, optionally highlight a specific element with a visible red border, then take a screenshot. Useful for visually documenting test failures or UI states.
    parameters:
      type: object
      properties:
        url:
          type: string
          description: The URL to screenshot
        highlight_selector:
          type: string
          description: Optional CSS selector of an element to highlight with a red outline before screenshotting
        full_page:
          type: boolean
          description: Attempt to capture the full scrollable page height (default false)
        filename:
          type: string
          description: Optional filename (without path). Defaults to a slug derived from the URL + timestamp.
      required: [url]

  - name: generate_test
    description: Crawl a URL with Selenium to inspect its structure, then return a ready-to-run test script (compatible with run_test_script) that covers the page's key elements — headings, links, forms, and basic accessibility checks.
    parameters:
      type: object
      properties:
        url:
          type: string
          description: The URL to generate a test for
        focus:
          type: string
          enum: [full, forms, navigation, accessibility, performance]
          description: "What aspect to focus the generated test on (default: full)"
      required: [url]
