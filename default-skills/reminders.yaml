name: reminders
version: 1.0.0
description: Set, list, and cancel reminders stored in SQLite
executor: reminders.ts
enabled: true
source: human
requires_env: []
tools:
  - name: set_reminder
    description: Set a reminder that fires at a specific time
    parameters:
      type: object
      properties:
        text: { type: string, description: Reminder message }
        fire_at_iso: { type: string, description: "ISO 8601 datetime when to fire (e.g. 2026-02-27T15:00:00Z)" }
        target_node: { type: string, description: "Node to alert (defaults to sender's node)" }
      required: [text, fire_at_iso]
  - name: list_reminders
    description: List all pending (unfired) reminders
    parameters:
      type: object
      properties: {}
  - name: cancel_reminder
    description: Cancel a reminder by ID
    parameters:
      type: object
      properties:
        id: { type: number, description: Reminder ID to cancel }
      required: [id]
