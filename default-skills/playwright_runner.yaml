name: playwright_runner
version: 1.0.0
description: |
  Runs a full TSD test scenario in a single tool call — reliable, atomic, session-persistent.

  WHEN TO USE: Use this instead of playwright_testing tools when running TSD test scenarios.
  All steps share one browser session so login state is preserved across every step.

  HOW TO USE (3 tool calls total):
    1. Call tsd_runner.start_report → get report_id
    2. Call playwright_runner.run_test_scenario with:
         - url: the login page URL
         - login: { username, password, success_url_contains (URL fragment after login e.g. "/dashboard") }
         - session_name: role name e.g. "nurse_manager"
         - report_id: from step 1 (auto-records each step into the report)
         - steps: array of test steps with Playwright scripts
    3. Call tsd_runner.finish_report → report sent to webchat automatically

  CRITICAL RULES FOR STEP SCRIPTS:
    1. Every script MUST call assert() at least once — a script with no assertions will be marked FAIL (unverified).
    2. Always wait for elements before interacting — use waitForSelector or locator().waitFor().
    3. Always verify the expected outcome stated in the TSD document using assert().
    4. Never write a script that just navigates without checking what happened.
    5. If you don't know the selectors, call playwright_testing.inspect_page first on the URL.

  STEP SCRIPT GLOBALS:
    - page: Playwright Page object (already navigated, session loaded, logged in)
    - assert(condition, name, actual?): REQUIRED — must be called at least once per script

  REAL EXAMPLES (always write scripts like these):

    Navigate to settings and verify tab is visible:
      await page.click('text=Settings');
      await page.waitForLoadState('domcontentloaded');
      const accountTab = await page.locator('text=Account').isVisible();
      assert(accountTab, 'Account tab is visible on Settings page');

    Fill field with weak password and assert validation error:
      await page.locator('input[placeholder*="New Password" i], input[name*="new" i]').fill('test');
      await page.locator('button[type=submit], button:has-text("Save")').click();
      await page.waitForTimeout(1000);
      const pageText = await page.locator('body').innerText();
      assert(pageText.includes('8 characters') || pageText.includes('uppercase') || pageText.includes('special'), 'password validation message shown', pageText.slice(0, 200));

    Assert success toast after saving:
      await page.waitForTimeout(500);
      const body = await page.locator('body').innerText();
      assert(body.toLowerCase().includes('success'), 'success message shown after save', body.slice(0, 300));

    Assert account locked message:
      const body = await page.locator('body').innerText();
      assert(body.toLowerCase().includes('lock') || body.toLowerCase().includes('account'), 'account locked message shown', body.slice(0, 300));

executor: playwright_runner.ts
enabled: true
source: human
requires_env: []
tools:
  - name: run_test_scenario
    description: |
      Execute a complete TSD test scenario in one call. Logs in, runs all steps in sequence
      in a single browser session, takes screenshots, and auto-records results to a tsd_runner
      report if report_id is provided. Returns per-step Pass/Fail with screenshots.
    parameters:
      type: object
      properties:
        url:
          type: string
          description: Starting URL — usually the login page (e.g. "https://sg-uat.respiree.com/login")
        session_name:
          type: string
          description: Name for this browser session (e.g. "nurse_manager"). Saved and reusable across calls.
        login:
          type: object
          description: Login credentials. If provided, the browser logs in before running test steps.
          properties:
            username:
              type: string
              description: Username or email to enter
            password:
              type: string
              description: Password to enter
            username_selector:
              type: string
              description: CSS selector for username field. Auto-detected if omitted.
            password_selector:
              type: string
              description: CSS selector for password field. Auto-detected if omitted.
            submit_selector:
              type: string
              description: CSS selector for submit button. Auto-detected if omitted.
            success_url_contains:
              type: string
              description: URL fragment to wait for after login (e.g. "/dashboard"). Highly recommended — helps confirm login succeeded.
          required: [username, password]
        steps:
          type: array
          description: Test steps to execute in order. Each step runs in the same browser session.
          items:
            type: object
            properties:
              name:
                type: string
                description: Short step name (e.g. "Step 1 – Navigate to Settings")
              description:
                type: string
                description: Full step description copied from the TSD document
              expected:
                type: string
                description: Expected result text from the TSD document (for reporting)
              script:
                type: string
                description: |
                  Playwright JavaScript to execute. Globals available: page, assert(cond, name, actual?).
                  The page is already loaded and logged in. Use await for all async operations.
              url:
                type: string
                description: Optional URL to navigate to before running this step's script
            required: [name, description, script]
        start_step_number:
          type: number
          description: Step number to start counting from (default 1). Use when resuming after an OTP/human step — e.g. if steps 1-2 already ran, pass start_step_number=3 so report numbering is correct.
        screenshot_each_step:
          type: boolean
          description: Take a screenshot after every step (default true). Screenshots are always taken on failure.
        report_id:
          type: string
          description: tsd_runner report_id. If provided, each step result is automatically recorded into the report. Get this from tsd_runner.start_report first.
        continue_on_failure:
          type: boolean
          description: Continue executing remaining steps even if one fails (default true). Set to false to stop at first failure.
      required: [url, steps]
