name: playwright_testing
version: 1.0.0
description: Reliable browser UI testing with Playwright. Supports persistent login sessions (storageState), auto-wait on every action, auto-screenshot on failure, and role switching. Use login to save a named session, then pass session_name to any other tool to resume that session (cookies + localStorage restored). For OTP/email steps, the tool returns and the agent should ask the user for the OTP, then call the next tool with the OTP value and the same session_name.
executor: playwright_testing.ts
enabled: true
source: human
requires_env: []
tools:
  - name: login
    description: Navigate to a login page, fill credentials, submit, and save the authenticated session for reuse. The session_name can be passed to any other tool to resume this logged-in state. Use different session_name values to manage multiple roles simultaneously (e.g. "nurse_manager", "nurse").
    parameters:
      type: object
      properties:
        url:
          type: string
          description: Full URL of the login page (must start with http:// or https://)
        username_selector:
          type: string
          description: CSS selector for the username/email input field
        username_value:
          type: string
          description: Username or email to enter
        password_selector:
          type: string
          description: CSS selector for the password input field
        password_value:
          type: string
          description: Password to enter
        submit_selector:
          type: string
          description: CSS selector for the login/submit button
        success_url_contains:
          type: string
          description: Optional URL fragment to wait for after login (e.g. "/dashboard"). If omitted, waits for any navigation.
        session_name:
          type: string
          description: Name for this session (default "default"). Use descriptive names like "nurse_manager" or "nurse" when testing multiple roles.
      required: [url, username_selector, username_value, password_selector, password_value, submit_selector]

  - name: run_script
    description: Execute a custom Playwright JavaScript test script against a URL, optionally using a saved session. The script has access to `page` (Playwright Page, already navigated to url) and `assert(condition, name, actual?)`. All assertions are captured and returned. Auto-screenshots on failure. Use this for complex multi-step flows within a single page load.
    parameters:
      type: object
      properties:
        url:
          type: string
          description: URL to navigate to before running the script
        script:
          type: string
          description: |
            Playwright JavaScript test script. Available globals: page (Playwright Page), assert(cond, name, actual?).
            Example:
              await page.locator('#username').fill('user@test.com');
              await page.locator('button[type=submit]').click();
              await page.waitForURL('**/dashboard**');
              const heading = await page.locator('h1').textContent();
              assert(heading.includes('Dashboard'), 'dashboard heading visible', heading);
        session_name:
          type: string
          description: Optional session name to load saved login state before navigating
        timeout_ms:
          type: number
          description: Default timeout for all page actions in milliseconds (default 30000)
      required: [url, script]

  - name: fill_form
    description: Navigate to a URL, fill form fields by CSS selector, optionally submit, and return the resulting URL and page title. Optionally uses a saved session for pages that require login. Use for login flows, settings forms, OTP entry, password change, etc.
    parameters:
      type: object
      properties:
        url:
          type: string
          description: URL of the page containing the form
        fields:
          type: array
          description: Fields to fill in order
          items:
            type: object
            properties:
              selector:
                type: string
                description: CSS selector for the input element
              value:
                type: string
                description: Value to type into the field
              clear_first:
                type: boolean
                description: Clear existing value before typing (default true)
            required: [selector, value]
        submit_selector:
          type: string
          description: CSS selector of the submit button to click after filling fields
        wait_after_ms:
          type: number
          description: Milliseconds to wait after clicking submit before reading results (default 2000)
        session_name:
          type: string
          description: Optional session name to load saved login state
      required: [url, fields]

  - name: assert_page
    description: Run multiple assertions on a page in a single call — check element visibility, text content, URL, element absence, or page title. Optionally uses a saved session. Stops at first failure and auto-screenshots the failure state. Use after fill_form or run_script to verify expected outcomes.
    parameters:
      type: object
      properties:
        url:
          type: string
          description: URL to navigate to for assertions
        session_name:
          type: string
          description: Optional session name to load saved login state
        assertions:
          type: array
          description: List of assertions to check in order
          items:
            type: object
            properties:
              type:
                type: string
                enum: [element_visible, element_text, url_contains, element_absent, page_title]
                description: "element_visible: element is in DOM and visible. element_text: element's text contains expected. url_contains: current URL contains expected. element_absent: element is not in DOM. page_title: page title contains expected."
              selector:
                type: string
                description: CSS selector (required for element_visible, element_text, element_absent)
              expected:
                type: string
                description: Expected text fragment (required for element_text, url_contains, page_title)
              timeout_ms:
                type: number
                description: How long to wait for this assertion to pass (default 10000)
            required: [type]
      required: [url, assertions]

  - name: take_screenshot
    description: Navigate to a URL with an optional saved session, optionally highlight a specific element with a red outline, then take a screenshot. Use to document test results, failures, or specific UI states.
    parameters:
      type: object
      properties:
        url:
          type: string
          description: URL to screenshot
        session_name:
          type: string
          description: Optional session name to load saved login state (for protected pages)
        highlight_selector:
          type: string
          description: Optional CSS selector of an element to highlight with a red outline before screenshotting
        full_page:
          type: boolean
          description: Capture the full scrollable page height (default false)
        filename:
          type: string
          description: Optional filename (without path). Defaults to a slug derived from URL + timestamp.
      required: [url]

  - name: clear_session
    description: Delete a saved session file to force a fresh login next time. Use when a session has expired or you want to test the login flow from scratch.
    parameters:
      type: object
      properties:
        session_name:
          type: string
          description: Name of the session to clear (default "default")
      required: []
