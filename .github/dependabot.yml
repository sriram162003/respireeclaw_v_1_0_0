version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 5
    groups:
      aws-sdk:
        patterns: ["@aws-sdk/*"]
      ai-sdks:
        patterns: ["@anthropic-ai/*", "openai", "@google/*"]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
